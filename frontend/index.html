<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse Ads — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f14;--surface:#16171f;--surface2:#1e2029;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#9a9ab0;--text3:#5a5a78;--blue:#4f8ef7;--blue2:#2563eb;--blue-glow:rgba(79,142,247,0.15);--red:#f87171;--red-glow:rgba(248,113,113,0.12);--green:#34d399;--font:'Cabinet Grotesk',sans-serif;--font-display:'Fraunces',Georgia,serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(79,142,247,0.06),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(167,139,250,0.05),transparent 50%);pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-family:var(--font-display);font-size:22px;font-weight:700}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--blue)}
.form-input::placeholder{color:var(--text3)}
.btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{opacity:0.9}
.btn-submit:disabled{opacity:0.5;pointer-events:none}
.error-box{background:var(--red-glow);border:1px solid rgba(248,113,113,0.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red);margin-top:12px;display:none;line-height:1.5}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-text{font-size:11px;color:var(--text3);text-align:center;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-mark">⚡</div><div class="logo-name">Pulse Ads</div></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Entrar</button>
    <button class="tab" onclick="showTab('register')">Criar conta</button>
  </div>
  <div id="tabLogin">
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="loginEmail" type="email" placeholder="seu@email.com"/></div>
    <div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="loginPassword" type="password" placeholder="••••••••"/></div>
    <button class="btn-submit" id="btnLogin" onclick="doLogin()">Entrar</button>
    <div class="error-box" id="loginError"></div>
  </div>
  <div id="tabRegister" style="display:none">
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="regName" placeholder="João Silva"/></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="regEmail" type="email" placeholder="seu@email.com"/></div>
    <div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="regPassword" type="password" placeholder="Mínimo 6 caracteres"/></div>
    <button class="btn-submit" id="btnRegister" onclick="doRegister()">Criar conta</button>
    <div class="error-box" id="registerError"></div>
  </div>
  <div class="footer-text">Pulse Ads © 2024 — Seus tokens ficam seguros no servidor</div>
</div>
<script>
function showTab(t){document.getElementById('tabLogin').style.display=t==='login'?'':'none';document.getElementById('tabRegister').style.display=t==='register'?'':'none';document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim(),password=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginError'),btn=document.getElementById('btnLogin');
  err.style.display='none';
  if(!email||!password){err.textContent='Preencha email e senha.';err.style.display='block';return;}
  btn.innerHTML='<div class="spinner"></div> Entrando...';btn.disabled=true;
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    localStorage.setItem('pa_token',d.token);localStorage.setItem('pa_user',JSON.stringify(d.user));
    window.location.href='/dashboard.html';
  }catch(e){err.textContent=e.message;err.style.display='block';btn.innerHTML='Entrar';btn.disabled=false;}
}
async function doRegister(){
  const name=document.getElementById('regName').value.trim(),email=document.getElementById('regEmail').value.trim(),password=document.getElementById('regPassword').value;
  const err=document.getElementById('registerError'),btn=document.getElementById('btnRegister');
  err.style.display='none';
  if(!name||!email||!password){err.textContent='Preencha todos os campos.';err.style.display='block';return;}
  btn.innerHTML='<div class="spinner"></div> Criando...';btn.disabled=true;
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    localStorage.setItem('pa_token',d.token);localStorage.setItem('pa_user',JSON.stringify(d.user));
    window.location.href='/dashboard.html';
  }catch(e){err.textContent=e.message;err.style.display='block';btn.innerHTML='Criar conta';btn.disabled=false;}
}
if(localStorage.getItem('pa_token'))window.location.href='/dashboard.html';
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('tabLogin').style.display!=='none')doLogin();else doRegister();}});
</script>
</body></html>
