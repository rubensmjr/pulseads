<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/><title>Produtivo</title><link rel="manifest" href="/produtivo/manifest.json"/><meta name="theme-color" content="#1877F2"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Produtivo"/><link rel="apple-touch-icon" href="/produtivo/icons/icon-192.png"/><link rel="icon" type="image/png" href="/produtivo/icons/icon-192.png"/><meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:"/><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/><script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" crossorigin="anonymous"></script><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html{height:100%;overflow:hidden}body{height:100%;background:#0C0F18;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased}#root{height:100%}input,select,button{font-family:inherit;-webkit-appearance:none}input[type="date"]{color-scheme:dark}select option{background:#1A1A24;color:#E8E8ED}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}.app-container{padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}</style></head><body><div id="root"></div>
<script>
var BASE='/produtivo';var API=BASE+'/api';
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register(BASE+'/sw.js',{scope:BASE+'/'}).catch(function(){})})}
</script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const TABS=["tarefas","pomodoro","contas"];
const PM={work:{label:"Foco",duration:1500,color:"#E8453C"},shortBreak:{label:"Pausa Curta",duration:300,color:"#2BA84A"},longBreak:{label:"Pausa Longa",duration:900,color:"#3B82F6"}};
const PRIO=[{v:"alta",l:"Alta",c:"#E8453C"},{v:"media",l:"Media",c:"#F59E0B"},{v:"baixa",l:"Baixa",c:"#3B82F6"}];
const MN=["Janeiro","Fevereiro","Marco","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DN=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

const api=async(path,opts={})=>{
  const t=localStorage.getItem('prod_token');
  const h={'Content-Type':'application/json'};
  if(t)h['Authorization']='Bearer '+t;
  const r=await fetch(API+path,{...opts,headers:h});
  if(r.status===401){localStorage.removeItem('prod_token');localStorage.removeItem('prod_user');window.location.reload()}
  return r;
};

const Icon=({name,size=18})=>{
  const i={
    check:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
    plus:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    trash:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
    play:<svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
    pause:<svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
    reset:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>,
    bell:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
    clock:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    list:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
    wallet:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
    skip:<svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" strokeWidth="2"/></svg>,
    logout:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  };
  return i[name]||null;
};

/* ═══ LOGIN ═══ */
function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const doLogin=async()=>{
    if(!email||!pass)return;
    setLoading(true);setErr("");
    try{
      const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pass})});
      const d=await r.json();
      if(r.ok){localStorage.setItem("prod_token",d.token);localStorage.setItem("prod_user",JSON.stringify(d.user));onLogin(d.user)}
      else{setErr(d.error||"Erro")}
    }catch(e){setErr("Sem conexao")}
    setLoading(false);
  };
  return(
    <div style={{...S.app,justifyContent:"center",alignItems:"center",padding:40,height:"100vh"}}>
      <div style={{width:"100%",maxWidth:340,display:"flex",flexDirection:"column",gap:16}}>
        <h1 style={{...S.logo,justifyContent:"center",marginBottom:8}}><span style={S.logoAccent}>&#9679;</span> Produtivo</h1>
        <p style={{textAlign:"center",color:"#8888A0",fontSize:14}}>Entre com sua conta</p>
        {err&&<p style={{color:"#E8453C",fontSize:13,textAlign:"center"}}>{err}</p>}
        <input style={S.input} placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <input style={S.input} placeholder="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <button style={{...S.btnPrimary,width:"100%",justifyContent:"center",padding:"14px",opacity:loading?0.6:1}} onClick={doLogin} disabled={loading}>{loading?"Entrando...":"Entrar"}</button>
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App(){
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("prod_user"))}catch{return null}});
  const[activeTab,setActiveTab]=useState("tarefas");
  const[tasks,setTasks]=useState([]);
  const[bills,setBills]=useState([]);
  const[pomodoroCount,setPomodoroCount]=useState(0);
  const[loading,setLoading]=useState(true);

  const checkNotifs=(bl)=>{
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    var now=new Date(),ts=now.toISOString().split("T")[0],tm=new Date(Date.now()+86400000).toISOString().split("T")[0],h=now.getHours();
    bl.forEach(function(b){
      if(b.paid)return;
      if(b.dueDate<ts&&h>=8&&h<=22){var dl=Math.ceil((new Date(ts)-new Date(b.dueDate))/86400000);new Notification("Conta atrasada "+dl+"d!",{body:b.name+" - R$ "+b.amount.toFixed(2),tag:"o-"+b.id,requireInteraction:true})}
      else if(b.dueDate===ts&&h>=8&&h<=22){new Notification("Conta vence HOJE!",{body:b.name+" - R$ "+b.amount.toFixed(2),tag:"t-"+b.id,requireInteraction:true})}
      else if(b.dueDate===tm&&h>=8&&h<=10){new Notification("Conta vence AMANHA",{body:b.name+" - R$ "+b.amount.toFixed(2),tag:"m-"+b.id})}
    });
  };

  useEffect(()=>{
    if(!user)return;
    (async()=>{
      try{
        const[tr,br,pr]=await Promise.all([api("/tasks"),api("/bills"),api("/pomodoros")]);
        if(tr.ok)setTasks(await tr.json());
        if(br.ok){const bd=await br.json();setBills(bd);setTimeout(()=>checkNotifs(bd),2000)}
        if(pr.ok){const d=await pr.json();setPomodoroCount(d.count)}
      }catch(e){}
      setLoading(false);
    })();
  },[user]);

  useEffect(()=>{
    if(!user)return;
    if("Notification" in window&&Notification.permission==="default"){
      var h=function(){Notification.requestPermission();document.removeEventListener('click',h)};
      document.addEventListener('click',h,{once:true});
    }
  },[user]);

  useEffect(()=>{
    if(!user)return;
    var i=setInterval(function(){api("/bills").then(function(r){return r.ok?r.json():null}).then(function(d){if(d)checkNotifs(d)})},3600000);
    return function(){clearInterval(i)};
  },[user]);

  const logout=()=>{localStorage.removeItem("prod_token");localStorage.removeItem("prod_user");setUser(null)};
  if(!user)return <LoginScreen onLogin={setUser}/>;
  if(loading)return(<div style={{...S.app,justifyContent:"center",alignItems:"center",height:"100vh"}}><p style={{color:"#8888A0"}}>Carregando...</p></div>);

  const tabIcons={tarefas:"list",pomodoro:"clock",contas:"wallet"};
  const tabLabels={tarefas:"Tarefas",pomodoro:"Pomodoro",contas:"Contas"};

  return(
    <div className="app-container" style={S.app}>
      <header style={S.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h1 style={S.logo}><span style={S.logoAccent}>&#9679;</span> Produtivo</h1>
          <button style={S.btnGhost} onClick={logout} title="Sair"><Icon name="logout" size={18}/></button>
        </div>
        <div style={S.statsRow}>
          <span>{tasks.filter(t=>t.done).length}/{tasks.length} tarefas</span>
          <span style={{opacity:0.4}}>&#183;</span>
          <span>{pomodoroCount} &#127813;</span>
          <span style={{opacity:0.4}}>&#183;</span>
          <span style={{color:"#1877F2"}}>{user.name}</span>
        </div>
      </header>
      <nav style={S.tabBar}>{TABS.map(tab=>(
        <button key={tab} onClick={()=>setActiveTab(tab)} style={{...S.tab,...(activeTab===tab?S.tabActive:{})}}>
          <Icon name={tabIcons[tab]} size={16}/><span>{tabLabels[tab]}</span>
        </button>
      ))}</nav>
      <main style={S.content}>
        {activeTab==="tarefas"&&<TaskPanel tasks={tasks} setTasks={setTasks}/>}
        {activeTab==="pomodoro"&&<PomodoroPanel count={pomodoroCount} setCount={setPomodoroCount}/>}
        {activeTab==="contas"&&<BillsPanel bills={bills} setBills={setBills}/>}
      </main>
    </div>
  );
}

/* ═══ TASKS ═══ */
function TaskPanel({tasks,setTasks}){
  const[input,setInput]=useState("");
  const[priority,setPriority]=useState("media");
  const[filter,setFilter]=useState("all");

  const addTask=async()=>{
    if(!input.trim())return;
    try{
      const r=await api("/tasks",{method:"POST",body:JSON.stringify({text:input.trim(),priority:priority})});
      if(r.ok){const t=await r.json();setTasks(p=>[...p,t]);setInput("")}
    }catch(e){}
  };
  const toggleTask=async id=>{
    const t=tasks.find(x=>x.id===id);if(!t)return;
    const nd=!t.done;
    setTasks(p=>p.map(x=>x.id===id?{...x,done:nd}:x));
    try{await api("/tasks/"+id,{method:"PUT",body:JSON.stringify({done:nd})})}catch(e){}
  };
  const removeTask=async id=>{
    setTasks(p=>p.filter(x=>x.id!==id));
    try{await api("/tasks/"+id,{method:"DELETE"})}catch(e){}
  };

  const pOrder={alta:0,media:1,baixa:2};
  const filtered=tasks.filter(t=>{
    if(filter==="done")return t.done;if(filter==="all")return!t.done;
    if(filter==="pending")return!t.done;
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    var pa=a.priority in pOrder?pOrder[a.priority]:1;var pb=b.priority in pOrder?pOrder[b.priority]:1;if(pa!==pb)return pa-pb;return a.id-b.id;
  });

  return(
    <div style={S.panel}>
      <div style={S.inputGroup}>
        <input style={S.input} placeholder="Nova tarefa..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}/>
        <div style={{display:"flex",gap:3}}>
          {PRIO.map(p=>(
            <button key={p.v} onClick={()=>setPriority(p.v)} style={{padding:"8px 10px",borderRadius:8,border:priority===p.v?"2px solid "+p.c:"2px solid transparent",background:priority===p.v?p.c+"22":"rgba(255,255,255,0.04)",color:priority===p.v?p.c:"#6B6B80",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{p.l}</button>
          ))}
        </div>
        <button style={S.btnPrimary} onClick={addTask}><Icon name="plus" size={16}/></button>
      </div>
      <div style={S.filterRow}>
        {[["all","Todas"],["pending","Pendentes"],["done","Feitas"]].map(([k,l])=>(
          <button key={k} style={{...S.chip,...(filter===k?S.chipActive:{})}} onClick={()=>setFilter(k)}>{l}</button>
        ))}
      </div>
      <div style={S.taskList}>
        {filtered.length===0&&<p style={S.empty}>{filter==="done"?"Nenhuma concluida.":filter==="pending"?"Tudo feito!":"Adicione uma tarefa."}</p>}
        {filtered.map(task=>(
          <div key={task.id} style={{...S.taskCard,...(task.done?S.taskDone:{})}}>
            <button style={{...S.checkbox,...(task.done?S.checkboxChecked:{})}} onClick={()=>toggleTask(task.id)}>{task.done&&<Icon name="check" size={14}/>}</button>
            <div style={S.taskContent}>
              <span style={{...S.taskText,...(task.done?S.taskTextDone:{})}}>{task.text}</span>
              <span style={{fontSize:11,fontWeight:600,color:task.priority==="alta"?"#E8453C":task.priority==="baixa"?"#3B82F6":"#F59E0B"}}>{task.priority==="alta"?"Alta":task.priority==="baixa"?"Baixa":"Media"}</span>
            </div>
            <button style={S.btnGhost} onClick={()=>removeTask(task.id)}><Icon name="trash" size={14}/></button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══ POMODORO ═══ */
function PomodoroPanel({count,setCount}){
  const[mode,setMode]=useState("work");
  const[timeLeft,setTimeLeft]=useState(PM.work.duration);
  const[running,setRunning]=useState(false);
  const[sessions,setSessions]=useState(0);
  const iRef=useRef(null);
  const aRef=useRef(null);

  useEffect(()=>{aRef.current={play:()=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=800;g.gain.value=0.3;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.8);o.stop(c.currentTime+0.8)}catch(e){}}}},[]);

  useEffect(()=>{
    if(running){
      iRef.current=setInterval(()=>{
        setTimeLeft(p=>{
          if(p<=1){
            clearInterval(iRef.current);setRunning(false);aRef.current&&aRef.current.play();
            if(mode==="work"){
              const n=sessions+1;setSessions(n);const nc=count+1;setCount(nc);
              api("/pomodoros",{method:"PUT",body:JSON.stringify({count:nc})});
              if("Notification" in window&&Notification.permission==="granted")new Notification("Pomodoro concluido!",{body:"Sessao #"+n});
              const next=n%4===0?"longBreak":"shortBreak";setMode(next);return PM[next].duration;
            }else{
              if("Notification" in window&&Notification.permission==="granted")new Notification("Pausa encerrada!",{body:"Volte ao foco!"});
              setMode("work");return PM.work.duration;
            }
          }
          return p-1;
        });
      },1000);
    }
    return()=>clearInterval(iRef.current);
  },[running,mode,sessions,count,setCount]);

  const switchMode=m=>{setRunning(false);clearInterval(iRef.current);setMode(m);setTimeLeft(PM[m].duration)};
  const resetTimer=()=>{setRunning(false);clearInterval(iRef.current);setTimeLeft(PM[mode].duration)};
  const mins=Math.floor(timeLeft/60),secs=timeLeft%60;
  const progress=1-timeLeft/PM[mode].duration;
  const ts=Math.min(280,typeof window!=='undefined'?window.innerWidth-80:280);
  const tr=ts/2-20,tc=2*Math.PI*tr,td=tc*(1-progress);

  return(
    <div style={S.panel}>
      <div style={S.modeRow}>{Object.entries(PM).map(([k,v])=>(
        <button key={k} style={{...S.modeBtn,...(mode===k?{background:v.color,color:"#fff"}:{})}} onClick={()=>switchMode(k)}>{v.label}</button>
      ))}</div>
      <div style={{...S.timerWrapper,width:ts,height:ts}}>
        <svg width={ts} height={ts} viewBox={"0 0 "+ts+" "+ts}>
          <circle cx={ts/2} cy={ts/2} r={tr} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/>
          <circle cx={ts/2} cy={ts/2} r={tr} fill="none" stroke={PM[mode].color} strokeWidth="8" strokeLinecap="round" strokeDasharray={tc} strokeDashoffset={td} transform={"rotate(-90 "+ts/2+" "+ts/2+")"} style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={S.timerText}>
          <span style={{...S.timerDigits,fontSize:Math.max(36,ts*0.18)}}>{String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}</span>
          <span style={S.timerLabel}>{PM[mode].label}</span>
        </div>
      </div>
      <div style={S.controlRow}>
        <button style={S.btnControl} onClick={resetTimer}><Icon name="reset" size={20}/></button>
        <button style={{...S.btnPlay,background:PM[mode].color}} onClick={()=>setRunning(!running)}><Icon name={running?"pause":"play"} size={28}/></button>
        <button style={S.btnControl} onClick={()=>{
          setRunning(false);clearInterval(iRef.current);
          if(mode==="work"){const n=sessions+1;setSessions(n);const nc=count+1;setCount(nc);api("/pomodoros",{method:"PUT",body:JSON.stringify({count:nc})});const next=n%4===0?"longBreak":"shortBreak";setMode(next);setTimeLeft(PM[next].duration)}
          else{setMode("work");setTimeLeft(PM.work.duration)}
        }}><Icon name="skip" size={20}/></button>
      </div>
      <div style={S.sessionInfo}>
        <div style={S.tomatoRow}>{[...Array(4)].map((_,i)=>(<span key={i} style={{transition:"opacity 0.3s",opacity:i<(sessions%4)?1:0.2}}>&#127813;</span>))}</div>
        <span style={{fontSize:13,color:"#6B6B80"}}>Sessao {(sessions%4)+1} de 4 - Total: {count}</span>
      </div>
    </div>
  );
}

/* ═══ BILLS ═══ */
function BillsPanel({bills,setBills}){
  const[form,setForm]=useState({name:"",amount:"",dueDate:"",recurring:false});
  const[showForm,setShowForm]=useState(false);
  const[calMonth,setCalMonth]=useState(()=>new Date().getMonth());
  const[calYear,setCalYear]=useState(()=>new Date().getFullYear());
  const[selectedDate,setSelectedDate]=useState(null);

  const addBill=async()=>{
    if(!form.name.trim()||!form.dueDate)return;
    try{
      const r=await api("/bills",{method:"POST",body:JSON.stringify({name:form.name.trim(),amount:parseFloat(form.amount)||0,dueDate:form.dueDate,recurring:form.recurring})});
      if(r.ok){const b=await r.json();setBills(p=>[...p,b]);setForm({name:"",amount:"",dueDate:"",recurring:false});setShowForm(false)}
    }catch(e){}
  };
  const togglePaid=async id=>{
    const b=bills.find(x=>x.id===id);if(!b)return;
    const np=!b.paid;
    setBills(p=>p.map(x=>x.id===id?{...x,paid:np}:x));
    try{await api("/bills/"+id,{method:"PUT",body:JSON.stringify({paid:np})})}catch(e){}
  };
  const removeBill=async id=>{
    setBills(p=>p.filter(x=>x.id!==id));
    try{await api("/bills/"+id,{method:"DELETE"})}catch(e){}
  };
  const getNextMonthDate=ds=>{const d=new Date(ds+"T00:00:00");const od=d.getDate();d.setMonth(d.getMonth()+1);if(d.getDate()!==od)d.setDate(0);return d.toISOString().split("T")[0]};

  useEffect(()=>{
    const today=new Date();
    const limit=new Date(today.getFullYear(),today.getMonth()+6,today.getDate()).toISOString().split("T")[0];
    const rn=[...new Set(bills.filter(b=>b.recurring).map(b=>b.name))];
    var newBills=[];
    rn.forEach(function(name){
      const oc=bills.filter(b=>b.name===name&&b.recurring);
      if(!oc.length)return;
      var ld=oc[0].dueDate;
      oc.forEach(function(o){if(o.dueDate>ld)ld=o.dueDate});
      var nd=getNextMonthDate(ld);
      while(nd<=limit){
        if(!bills.some(b=>b.name===name&&b.dueDate===nd)&&!newBills.some(b=>b.name===name&&b.dueDate===nd)){
          newBills.push({name:name,amount:oc[0].amount,dueDate:nd,recurring:true});
        }
        nd=getNextMonthDate(nd);
      }
    });
    if(newBills.length>0){
      Promise.all(newBills.map(b=>api("/bills",{method:"POST",body:JSON.stringify(b)}).then(r=>r.ok?r.json():null))).then(function(results){
        const valid=results.filter(Boolean);
        if(valid.length)setBills(p=>[...p,...valid]);
      });
    }
  },[bills.length]);

  const getDueStatus=(dd,paid)=>{
    if(paid)return{label:"Pago",color:"#2BA84A"};
    const t=new Date();t.setHours(0,0,0,0);const d=new Date(dd+"T00:00:00");
    const diff=Math.ceil((d-t)/86400000);
    if(diff<0)return{label:Math.abs(diff)+"d atrasado",color:"#E8453C"};
    if(diff===0)return{label:"Hoje!",color:"#F59E0B"};
    if(diff<=3)return{label:"em "+diff+"d",color:"#F59E0B"};
    return{label:"em "+diff+"d",color:"#6B7280"};
  };

  const totalPending=bills.filter(b=>{if(b.paid)return false;const d=new Date(b.dueDate+"T00:00:00");return d.getMonth()===calMonth&&d.getFullYear()===calYear}).reduce((s,b)=>s+b.amount,0);

  const getCalDays=()=>{
    const fd=new Date(calYear,calMonth,1).getDay(),dm=new Date(calYear,calMonth+1,0).getDate(),dp=new Date(calYear,calMonth,0).getDate();
    const days=[];
    for(let i=fd-1;i>=0;i--)days.push({day:dp-i,inMonth:false,dateStr:null});
    for(let d=1;d<=dm;d++){days.push({day:d,inMonth:true,dateStr:calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")})}
    const rem=7-(days.length%7);if(rem<7)for(let i=1;i<=rem;i++)days.push({day:i,inMonth:false,dateStr:null});
    return days;
  };

  const getBills=ds=>bills.filter(b=>b.dueDate===ds);
  const todayStr=new Date().toISOString().split("T")[0];
  const prevM=()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1)}else setCalMonth(m=>m-1);setSelectedDate(null)};
  const nextM=()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1)}else setCalMonth(m=>m+1);setSelectedDate(null)};
  const calDays=getCalDays();
  const displayBills=selectedDate?getBills(selectedDate):[...bills].filter(b=>{const d=new Date(b.dueDate+"T00:00:00");return d.getMonth()===calMonth&&d.getFullYear()===calYear}).sort((a,b)=>{if(a.paid!==b.paid)return a.paid?1:-1;return new Date(a.dueDate)-new Date(b.dueDate)});

  return(
    <div style={S.panel}>
      <div style={S.billSummary}>
        <div><span style={S.summaryLabel}>Pendente em {MN[calMonth]}</span><span style={S.summaryValue}>R$ {totalPending.toFixed(2)}</span></div>
        <button style={S.btnPrimary} onClick={()=>setShowForm(!showForm)}><Icon name="plus" size={16}/></button>
      </div>
      {showForm&&(
        <div style={S.billForm}>
          <input style={S.input} placeholder="Nome da conta" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          <input style={S.input} placeholder="Valor (R$)" type="number" step="0.01" inputMode="decimal" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
          <input style={S.input} type="date" value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))}/>
          <button type="button" onClick={()=>setForm(f=>({...f,recurring:!f.recurring}))} style={{display:"flex",alignItems:"center",gap:8,background:form.recurring?"rgba(24,119,242,0.15)":"rgba(255,255,255,0.04)",border:form.recurring?"1px solid rgba(24,119,242,0.4)":"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",width:"100%",cursor:"pointer",fontSize:13,color:form.recurring?"#1877F2":"#8888A0"}}>
            <span style={{width:18,height:18,borderRadius:4,border:form.recurring?"none":"2px solid rgba(255,255,255,0.3)",background:form.recurring?"#1877F2":"transparent",display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{form.recurring&&<Icon name="check" size={12}/>}</span>
            <span>Recorrente (mensal)</span>
          </button>
          <button style={{...S.btnPrimary,width:"100%",justifyContent:"center"}} onClick={addBill}>Adicionar Conta</button>
        </div>
      )}
      <div style={C.wrapper}>
        <div style={C.navRow}><button style={C.navBtn} onClick={prevM}>&#8249;</button><span style={C.monthLabel}>{MN[calMonth]} {calYear}</span><button style={C.navBtn} onClick={nextM}>&#8250;</button></div>
        <div style={C.grid}>
          {DN.map(d=><div key={d} style={C.dayHeader}>{d}</div>)}
          {calDays.map((cell,i)=>{
            const bd=cell.dateStr?getBills(cell.dateStr):[];
            const hb=bd.length>0,it=cell.dateStr===todayStr,is=cell.dateStr===selectedDate;
            return(
              <button key={i} onClick={()=>cell.inMonth&&cell.dateStr&&setSelectedDate(p=>p===cell.dateStr?null:cell.dateStr)} style={{...C.dayCell,...(cell.inMonth?{}:C.dayCellOutside),...(it?C.dayCellToday:{}),...(is?C.dayCellSelected:{})}}>
                <span style={C.dayNum}>{cell.day}</span>
                {hb&&<div style={C.dotRow}>{bd.slice(0,3).map((b,j)=><span key={j} style={{...C.dot,background:b.paid?"#2BA84A":(b.dueDate<todayStr?"#E8453C":"#F59E0B")}}/>)}{bd.length>3&&<span style={C.dotMore}>+{bd.length-3}</span>}</div>}
              </button>
            );
          })}
        </div>
        <div style={C.legend}>
          <span style={C.legendItem}><span style={{...C.legendDot,background:"#E8453C"}}/> Atrasado</span>
          <span style={C.legendItem}><span style={{...C.legendDot,background:"#F59E0B"}}/> Pendente</span>
          <span style={C.legendItem}><span style={{...C.legendDot,background:"#2BA84A"}}/> Pago</span>
        </div>
      </div>
      {selectedDate&&<div style={C.selectedLabel}><span>{new Date(selectedDate+"T00:00:00").toLocaleDateString("pt-BR",{day:"numeric",month:"long"})}</span><button style={{...S.chip,fontSize:11,padding:"3px 10px"}} onClick={()=>setSelectedDate(null)}>Ver todas</button></div>}
      <div style={S.taskList}>
        {displayBills.length===0&&<p style={S.empty}>{selectedDate?"Nenhuma conta neste dia.":"Nenhuma conta neste mes."}</p>}
        {displayBills.map(bill=>{
          const st=getDueStatus(bill.dueDate,bill.paid);
          return(
            <div key={bill.id} style={{...S.taskCard,...(bill.paid?S.taskDone:{})}}>
              <button style={{...S.checkbox,...(bill.paid?S.checkboxChecked:{})}} onClick={()=>togglePaid(bill.id)}>{bill.paid&&<Icon name="check" size={14}/>}</button>
              <div style={S.taskContent}>
                <span style={{...S.taskText,...(bill.paid?S.taskTextDone:{})}}>{bill.name}{bill.recurring&&<span style={{marginLeft:6,fontSize:12}}>&#128257;</span>}</span>
                <div style={S.billMeta}>
                  <span style={S.billAmount}>R$ {bill.amount.toFixed(2)}</span>
                  <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:6,background:st.color+"22",color:st.color}}>{st.label}</span>
                  {!selectedDate&&<span style={{fontSize:11,color:"#555"}}>{new Date(bill.dueDate+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}</span>}
                </div>
              </div>
              <button style={S.btnGhost} onClick={()=>removeBill(bill.id)}><Icon name="trash" size={14}/></button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  btnControl:{width:48,height:48,borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#8888A0",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"},
  btnPlay:{width:64,height:64,borderRadius:20,border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",boxShadow:"0 4px 20px rgba(232,69,60,0.3)"},

  dayCellOutside:{opacity:0.25,cursor:"default"},
  dayCellToday:{background:"rgba(24,119,242,0.1)",border:"1px solid rgba(24,119,242,0.3)"},

  dotRow:{display:"flex",gap:2,alignItems:"center",justifyContent:"center",flexWrap:"wrap"},

  dotMore:{fontSize:7,color:"#888",fontWeight:600},
  legend:{display:"flex",justifyContent:"center",gap:14,marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.05)"},
  legendItem:{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#6B6B80"},
  legendDot:{display:"inline-block",width:7,height:7,borderRadius:"50%"},
  selectedLabel:{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,fontWeight:600,color:"#E8E8ED",padding:"4px 0"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
